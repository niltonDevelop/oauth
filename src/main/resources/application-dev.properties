# Perfil local / desarrollo — NO usar en producción
oauth.issuer=http://127.0.0.1:9190

oauth.internal-token=${OAUTH_INTERNAL_TOKEN:1234567890}
oauth.gateway.internal-token=${GATEWAY_INTERNAL_TOKEN:1234567890}

oauth.admin.username=admin
oauth.admin.password=123456

oauth.client.registration-id=gateway-client
oauth.client.id=gateway-app
oauth.client.secret={noop}12345
oauth.client.redirect-uri=http://127.0.0.1:8080/login/oauth2/code/client-app
oauth.client.redirect-uri-auth=http://127.0.0.1:8080/authorized
oauth.client.post-logout-redirect-uri=http://127.0.0.1:8080/logout

oauth.flutter.client.registration-id=flutter-client
oauth.flutter.client.id=flutter-app
oauth.flutter.client.redirect-uri=com.ngonzano.app://oauth/callback

# Sin claves PEM: se genera par RSA efímero al arrancar (solo dev)
