eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true

# Issuer público (JWT iss) — el navegador accede por localhost:9190
oauth.issuer=http://localhost:9190

oauth.internal-token=${OAUTH_INTERNAL_TOKEN:1234567890}
oauth.gateway.internal-token=${GATEWAY_INTERNAL_TOKEN:1234567890}

oauth.admin.username=admin
oauth.admin.password=123456

oauth.client.registration-id=gateway-client
oauth.client.id=gateway-app
oauth.client.secret={noop}12345
oauth.client.redirect-uri=http://localhost:8080/login/oauth2/code/client-app
oauth.client.redirect-uri-auth=http://localhost:8080/authorized
oauth.client.post-logout-redirect-uri=http://localhost:8080/logout

oauth.flutter.client.registration-id=flutter-client
oauth.flutter.client.id=flutter-app
oauth.flutter.client.redirect-uri=com.ngonzano.app://oauth/callback

management.tracing.export.zipkin.endpoint=http://zipkin:9411/api/v2/spans
