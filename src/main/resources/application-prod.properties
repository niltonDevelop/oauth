# Perfil producción — secretos SOLO vía variables de entorno (sin defaults inseguros)
oauth.issuer=${OAUTH_ISSUER}

oauth.internal-token=${OAUTH_INTERNAL_TOKEN}
oauth.gateway.internal-token=${GATEWAY_INTERNAL_TOKEN}

oauth.admin.username=${OAUTH_ADMIN_USERNAME}
oauth.admin.password=${OAUTH_ADMIN_PASSWORD}

oauth.client.registration-id=${OAUTH_GATEWAY_REGISTRATION_ID:gateway-client}
oauth.client.id=${OAUTH_GATEWAY_CLIENT_ID}
oauth.client.secret=${OAUTH_GATEWAY_CLIENT_SECRET}
oauth.client.redirect-uri=${OAUTH_GATEWAY_REDIRECT_URI}
oauth.client.redirect-uri-auth=${OAUTH_GATEWAY_REDIRECT_URI_AUTH:}
oauth.client.post-logout-redirect-uri=${OAUTH_GATEWAY_POST_LOGOUT_REDIRECT_URI}

oauth.flutter.client.registration-id=${OAUTH_FLUTTER_REGISTRATION_ID:flutter-client}
oauth.flutter.client.id=${OAUTH_FLUTTER_CLIENT_ID:flutter-app}
oauth.flutter.client.redirect-uri=${OAUTH_FLUTTER_REDIRECT_URI:}

# Claves JWKS estables (PEM PKCS#8 / SPKI, multilínea o con \\n)
oauth.jwk.key-id=${OAUTH_JWK_KEY_ID:oauth-signing-key}
oauth.jwk.private-key=${OAUTH_JWK_PRIVATE_KEY}
oauth.jwk.public-key=${OAUTH_JWK_PUBLIC_KEY}

# Variables requeridas en prod:
# OAUTH_ISSUER, OAUTH_INTERNAL_TOKEN, GATEWAY_INTERNAL_TOKEN
# OAUTH_GATEWAY_CLIENT_ID, OAUTH_GATEWAY_CLIENT_SECRET
# OAUTH_GATEWAY_REDIRECT_URI, OAUTH_GATEWAY_POST_LOGOUT_REDIRECT_URI
# OAUTH_JWK_PRIVATE_KEY, OAUTH_JWK_PUBLIC_KEY
